# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"            # architecture discussion + code authoring assistance
ai_usage_summary: |
  Claude was used to help design the architecture and author/refactor the code.
  All design decisions, scoring logic, and tuning are the team's own engineering.
  No candidate data was sent to any hosted LLM. The ranking step uses only local
  models (TF-IDF + SVD); optional free-tier LLMs (Ollama/Gemini/Groq) are used
  only for offline JD-spec generation and reasoning polish, never during ranking.

# ============================================================================
# Approach summary (<=200 words)
# ============================================================================
methodology_summary: |
  Hybrid funnel that ranks candidates like a recruiter, robust to the dataset's
  four traps. Parse -> conservative honeypot/integrity filter -> cheap recall
  prefilter (100K->shortlist) -> local semantic encoding (TF-IDF+SVD; optional
  sentence-transformers) -> multi-dimensional scoring -> behavioral modifier ->
  rank -> grounded reasoning. Scoring is weighted toward CAREER EVIDENCE (shipped
  ranking/search/recsys at product companies) and SEMANTIC fit, with skills
  trust-weighted by proficiency/endorsements/months-used/assessment so keyword
  stuffing scores near zero. The 23 Redrob signals form an availability
  multiplier that down-weights stale, unresponsive profiles. Explicit JD-derived
  disqualifiers (services-only, pure research, recent-LLM-wrapper-only,
  title-chasers, CV/speech/robotics-only) apply graduated penalties. Honeypots
  with impossible timelines or unused "expert" skills are filtered before
  scoring. Runs in ~28s on the full 100K pool, CPU-only, no network. LLMs are
  used only offline (JD understanding + reasoning), never per-candidate.

